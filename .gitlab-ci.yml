stages:
  - test
  - deploy

# Global Workflow Rules
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: never
    - when: always

variables:
  DEPLOY_DIR: "/services"
  SSH_USER: "manage"
  SSH_PORT: "2292"
  REMOTE_OWNER: "manage"

# Hidden job for SSH & Tooling Setup
.setup_ssh:
  before_script:
    - echo "--- Preparing Environment ---"
    - apt-get update && apt-get install -y gettext-base openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 "${SSH_PRIVATE_KEY}"
    - ssh-add "${SSH_PRIVATE_KEY}"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "${SSH_KNOWN_HOSTS}" ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts

# Hidden job for Deployment Logic
.deploy_template:
  extends: .setup_ssh
  stage: deploy
  script:
    - echo "--- Deploying Service:${SERVICE_NAME} ---"
    - SERVICE_ROOT="services/${SERVICE_NAME}"
    - REMOTE_PATH="${DEPLOY_DIR}/services/${SERVICE_NAME}"
    - ENV_FILE="${SERVICE_ROOT}/.env.template"
    - LOCAL_DOTENV="${SERVICE_ROOT}/.env"

    - |
      if [ ! -f "${ENV_FILE}" ]; then
        echo "ERROR: ${ENV_FILE} not found"
        exit 1
      fi

    - echo "Generating .env from template..."
    - envsubst < "${ENV_FILE}" > "${LOCAL_DOTENV}"

    - echo "Updating remote repository with retry logic..."
    - |
      ssh -p "${SSH_PORT}" "${SSH_USER}@${CONTROLLER}" \
        "set -euo pipefail; \
         sudo -n mkdir -p ${DEPLOY_DIR}; \
         owner=\"\$(stat -c '%U:%G' ${DEPLOY_DIR} 2>/dev/null || true)\"; \
         if [ \"\${owner}\" != \"${REMOTE_OWNER}:${REMOTE_OWNER}\" ]; then \
           sudo -n chown -R ${REMOTE_OWNER}:${REMOTE_OWNER} ${DEPLOY_DIR}; \
         fi; \
         if ! sudo -n git config --system --get-all safe.directory 2>/dev/null | grep -Fxq \"${DEPLOY_DIR}\"; then \
           sudo -n git config --system --add safe.directory ${DEPLOY_DIR}; \
         fi; \
         cd ${DEPLOY_DIR}; \
         for i in 1 2 3 4 5; do \
           git fetch origin && \
           git reset --hard origin/${CI_COMMIT_BRANCH} && \
           git clean -fd && \
           break || \
           { echo 'Git sync failed, retrying in 5s...'; sleep 5; }; \
         done"

    - echo "Uploading configuration..."
    - ssh -p "${SSH_PORT}" "${SSH_USER}@${CONTROLLER}" "mkdir -p ${REMOTE_PATH}"
    - scp -P "${SSH_PORT}" "${LOCAL_DOTENV}"
      "${SSH_USER}@${CONTROLLER}:${REMOTE_PATH}/.env"

    - echo "Executing remote deployment..."
    - |
      ssh -p "${SSH_PORT}" "${SSH_USER}@${CONTROLLER}" \
        "set -euo pipefail; \
         cd ${REMOTE_PATH} && \
         docker compose pull && \
         docker compose up -d --remove-orphans && \
         docker compose ps && \
         if [ -n \"${HEALTHCHECK_CMD:-}\" ]; then \
           eval \"${HEALTHCHECK_CMD}\"; \
         fi && \
         echo 'Deployment of ${SERVICE_NAME} completed successfully'"
  after_script:
    - rm -f "services/${SERVICE_NAME}/.env" || true

# --- Service Deployments ---

deploy_traefik:
  extends: .deploy_template
  variables:
    SERVICE_NAME: "traefik"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - services/traefik/**

deploy_wud:
  extends: .deploy_template
  variables:
    SERVICE_NAME: "wud"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - services/wud/**

deploy_portainer:
  extends: .deploy_template
  variables:
    SERVICE_NAME: "portainer"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - services/portainer/**

deploy_mysql:
  extends: .deploy_template
  variables:
    SERVICE_NAME: "mysql"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - services/mysql/**

deploy_pgsql:
  extends: .deploy_template
  variables:
    SERVICE_NAME: "pgsql"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - services/pgsql/**

deploy_n8n:
  extends: .deploy_template
  variables:
    SERVICE_NAME: "n8n"
    HEALTHCHECK_CMD: "curl -fsS --max-time 10 http://127.0.0.1:5678/healthz >/dev/null"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - services/n8n/**

deploy_grafana:
  extends: .deploy_template
  variables:
    SERVICE_NAME: "grafana"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - services/grafana/**

deploy_prometheus:
  extends: .deploy_template
  variables:
    SERVICE_NAME: "prometheus"
    HEALTHCHECK_CMD: "curl -fsS --max-time 10 http://127.0.0.1:9090/-/healthy >/dev/null"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - services/prometheus/**

deploy_ai_dev_orchestrator:
  extends: .setup_ssh
  stage: deploy
  variables:
    SERVICE_NAME: "ai-dev-orchestrator"
    ALLOWED_REPOS_FILE: "/run/config/allowed-repos.json"
  script:
    - echo "--- Deploying Service:${SERVICE_NAME} ---"
    - SERVICE_ROOT="services/${SERVICE_NAME}"
    - REMOTE_PATH="${DEPLOY_DIR}/services/${SERVICE_NAME}"
    - ENV_FILE="${SERVICE_ROOT}/.env.template"
    - LOCAL_DOTENV="${SERVICE_ROOT}/.env"

    - |
      if [ ! -f "${ENV_FILE}" ]; then
        echo "ERROR: ${ENV_FILE} not found"
        exit 1
      fi

    - echo "Generating .env from template..."
    - envsubst < "${ENV_FILE}" > "${LOCAL_DOTENV}"

    - echo "Updating remote repository with retry logic..."
    - |
      ssh -p "${SSH_PORT}" "${SSH_USER}@${CONTROLLER}" \
        "set -euo pipefail; \
         sudo -n mkdir -p ${DEPLOY_DIR}; \
         owner=\"\$(stat -c '%U:%G' ${DEPLOY_DIR} 2>/dev/null || true)\"; \
         if [ \"\${owner}\" != \"${REMOTE_OWNER}:${REMOTE_OWNER}\" ]; then \
           sudo -n chown -R ${REMOTE_OWNER}:${REMOTE_OWNER} ${DEPLOY_DIR}; \
         fi; \
         if ! sudo -n git config --system --get-all safe.directory 2>/dev/null | grep -Fxq \"${DEPLOY_DIR}\"; then \
           sudo -n git config --system --add safe.directory ${DEPLOY_DIR}; \
         fi; \
         cd ${DEPLOY_DIR}; \
         for i in 1 2 3 4 5; do \
           git fetch origin && \
           git reset --hard origin/${CI_COMMIT_BRANCH} && \
           git clean -fd && \
           break || \
           { echo 'Git sync failed, retrying in 5s...'; sleep 5; }; \
         done"

    - echo "Uploading environment file..."
    - ssh -p "${SSH_PORT}" "${SSH_USER}@${CONTROLLER}" "mkdir -p ${REMOTE_PATH}"
    - scp -P "${SSH_PORT}" "${LOCAL_DOTENV}"
      "${SSH_USER}@${CONTROLLER}:${REMOTE_PATH}/.env"

    - |
      if [ -n "${AI_DEV_ORCHESTRATOR_ALLOWED_REPOS_FILE:-}" ]; then
        echo "Uploading allowed repo file..."
        ssh -p "${SSH_PORT}" "${SSH_USER}@${CONTROLLER}" "mkdir -p ${REMOTE_PATH}/conf"
        scp -P "${SSH_PORT}" "${AI_DEV_ORCHESTRATOR_ALLOWED_REPOS_FILE}" "${SSH_USER}@${CONTROLLER}:${REMOTE_PATH}/conf/allowed-repos.json"
      else
        echo "AI_DEV_ORCHESTRATOR_ALLOWED_REPOS_FILE not provided; relying on ALLOWED_REPOS_JSON or existing remote conf"
      fi

    - echo "Executing remote deployment..."
    - |
      ssh -p "${SSH_PORT}" "${SSH_USER}@${CONTROLLER}" \
        "set -euo pipefail; \
         cd ${REMOTE_PATH} && \
         docker compose pull && \
         docker compose up -d --remove-orphans && \
         docker compose ps && \
         echo 'Deployment of ${SERVICE_NAME} completed successfully'"
  after_script:
    - rm -f "services/${SERVICE_NAME}/.env" || true
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - .gitlab-ci.yml
        - services/ai-dev-orchestrator/**
