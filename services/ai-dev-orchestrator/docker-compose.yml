services:
  orchestrator:
    build:
      context: .
    container_name: ai-dev-orchestrator
    hostname: ai-dev-orchestrator
    restart: unless-stopped
    environment:
      ORCHESTRATOR_TOKEN: ${ORCHESTRATOR_TOKEN}
      ALLOWED_REPOS_JSON: ${ALLOWED_REPOS_JSON:-}
      ALLOWED_REPOS_FILE: ${ALLOWED_REPOS_FILE:-}
      ORCHESTRATOR_WORK_ROOT: /app/.orchestrator
    volumes:
      - ./data:/app/.orchestrator
      - ./conf:/run/config:ro
    networks:
      - control-plane
    labels:
      - traefik.enable=true
      - traefik.http.routers.ai-orchestrator.rule=Host(`orchestrator.${APP_DOMAIN}`)
      - traefik.http.routers.ai-orchestrator.entrypoints=websecure
      - traefik.http.routers.ai-orchestrator.tls.certresolver=myresolver
      - traefik.http.services.ai-orchestrator.loadbalancer.server.port=8000
      - traefik.http.routers.ai-orchestrator.middlewares=auth

networks:
  control-plane:
    external: true
